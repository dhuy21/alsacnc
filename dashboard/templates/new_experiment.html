{% extends "base.html" %}
{% block title %}New Experiment - ALSACNC{% endblock %}

{% block content %}
<div class="page-header">
    <h1>New Experiment</h1>
</div>

<section class="card">
    <form method="post" action="/new" class="form">
        <div class="form-group">
            <label>Number of Websites</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="num_websites" value="3"> 3 (test)</label>
                <label class="radio-label"><input type="radio" name="num_websites" value="10" checked> 10</label>
                <label class="radio-label"><input type="radio" name="num_websites" value="100"> 100</label>
                <label class="radio-label"><input type="radio" name="num_websites" value="1000"> 1,000</label>
                <label class="radio-label"><input type="radio" name="num_websites" value="10000"> 10,000</label>
            </div>
        </div>

        <div class="form-group">
            <label>Number of Browsers (Crawlers)</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="num_browsers" value="1" checked> 1</label>
                <label class="radio-label"><input type="radio" name="num_browsers" value="3"> 3</label>
                <label class="radio-label"><input type="radio" name="num_browsers" value="5"> 5</label>
            </div>
        </div>

        <div class="form-group">
            <label>Execution Mode</label>
            <div class="mode-cards">
                <label class="mode-card selected">
                    <input type="radio" name="mode" value="full" checked>
                    <div class="mode-card-content">
                        <strong>Full Pipeline (Recommended)</strong>
                        <p>Crawl &rarr; Predict Cookies &rarr; Predict Purposes &rarr; Summary runs automatically. You'll see real-time progress.</p>
                    </div>
                </label>
                <label class="mode-card">
                    <input type="radio" name="mode" value="step">
                    <div class="mode-card-content">
                        <strong>Step-by-Step</strong>
                        <p>Start with crawl only. Run each subsequent step manually after reviewing intermediate results.</p>
                    </div>
                </label>
            </div>
        </div>

        <div class="form-actions">
            <a href="/" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary btn-lg">Start Experiment</button>
        </div>
    </form>
</section>
{% endblock %}

{% block scripts %}
<script>
document.querySelectorAll('.mode-card input[type="radio"]').forEach(radio => {
    radio.addEventListener('change', () => {
        document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
        radio.closest('.mode-card').classList.add('selected');
    });
});
</script>
{% endblock %}
