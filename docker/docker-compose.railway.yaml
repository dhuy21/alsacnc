version: "3.9"

# Local simulation of the Railway deployment architecture.
# Uses the same Dockerfiles and env vars that Railway will use,
# but with docker-compose for local orchestration.

services:
    cookie_crawler:
        build:
            context: ../
            dockerfile: docker/crawler/Dockerfile.railway
        container_name: cookie_crawler
        dns:
            8.8.8.8
        volumes:
            - crawler-data:/opt/crawler/data
        shm_size: 2gb
        env_file:
            - ../.env.railway
        environment:
            - CONSENTOMATIC_DIR=consentomatic
            - DB_HOST=postgres-cc
            - LIBRE_TRANSLATE_HOST=libretranslate-cc
            - LIBRE_TRANSLATE_PORT=5000
            - IETC_MODEL_URL=http://classifiers:5001/predict_ietc
        depends_on:
            classifiers:
                condition: service_started
            postgres-cc:
                condition: service_started
            libretranslate-cc:
                condition: service_healthy

    classifiers:
        build:
            context: ../
            dockerfile: docker/classifiers/Dockerfile.railway
        container_name: classifiers
        env_file:
            - ../.env.railway
        environment:
            - DB_HOST=postgres-cc
        ports:
            - 5001:5001

    postgres-cc:
        image: postgres:12
        container_name: postgres-cc
        restart: unless-stopped
        ports:
            - 5432:5432
        logging:
            driver: "json-file"
            options:
                max-size: 50m
        environment:
            - POSTGRES_DB=crawl
            - POSTGRES_USER=cookiestudy23
            - POSTGRES_PASSWORD=cookiestudy2023
        volumes:
            - postgres-local:/var/lib/postgresql/data/

    libretranslate-cc:
        image: libretranslate/libretranslate:v1.5.6
        restart: unless-stopped
        ports:
            - 5000:5000
        healthcheck:
            test: ['CMD-SHELL', './venv/bin/python scripts/healthcheck.py']
        volumes:
            - lt-local:/home/libretranslate/.local

volumes:
    crawler-data:
        name: crawler-data
        external: false

    lt-local:
        name: lt-local
        external: false

    postgres-local:
        name: postgres-local
        external: false
