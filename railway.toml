# Railway config-as-code
# This file is used when deploying to Railway from a GitHub repo.
# Each service should set RAILWAY_DOCKERFILE_PATH in its Railway dashboard
# to point to the appropriate Dockerfile.
#
# Service configurations (set in Railway dashboard):
#
# cookie_crawler:
#   RAILWAY_DOCKERFILE_PATH = docker/crawler/Dockerfile.railway
#   Volume mount: /opt/crawler/data
#
# classifiers:
#   RAILWAY_DOCKERFILE_PATH = docker/classifiers/Dockerfile.railway
#
# postgres-cc:
#   Deploy via Railway's PostgreSQL plugin (not from repo)
#
# libretranslate-cc:
#   Deploy via Docker image: libretranslate/libretranslate:v1.5.6
#   Volume mount: /home/libretranslate/.local

[build]
dockerfilePath = "docker/crawler/Dockerfile.railway"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
